<header class="fixed inset-x-0 top-0 z-50 glass">
  <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">

    <!-- Brand -->
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-lg border border-electric/50 bg-graphite/60 flex items-center justify-center shadow-glow">
        <span class="material-icons text-blue-300">cloud</span>
      </div>
      <div>
        <p class="text-xs uppercase tracking-[0.28em] text-slate-400">Pedro Netto</p>
        <p class="text-white font-semibold">Infraestrutura & Automação</p>
      </div>
    </div>

    <!-- Desktop nav -->
    <nav class="hidden md:flex items-center gap-7 text-sm text-slate-300 font-medium">
      <a class="neon-link hover:text-blue-300" href="#sobre">Sobre</a>
      <a class="neon-link hover:text-blue-300" href="#experiencia">Experiência</a>
      <a class="neon-link hover:text-blue-300" href="#certificados">Certificados</a>
      <a class="neon-link hover:text-blue-300" href="#educacao">Educação</a>
      <a class="neon-link hover:text-blue-300" href="#contatos">Contato</a>
      <a
        href="https://wiki.nettotech.com.br/"
        target="_blank"
        rel="noopener noreferrer"
        class="soft-glow inline-flex items-center gap-2 rounded-lg border border-electric/60 bg-electric/85 hover:bg-electric text-white px-4 py-2 font-semibold"
        aria-label="Abrir Wiki em nova aba"
      >
        <span class="material-icons text-[18px]">auto_stories</span>
        Wiki
      </a>
      <a
        href="CV%20-%20Pedro%20H%20Netto.pdf"
        download="CV - Pedro H Netto.pdf"
        class="soft-glow inline-flex items-center gap-2 rounded-lg border border-slate-600 bg-graphite/55 hover:border-electric/60 hover:text-blue-200 text-slate-100 px-4 py-2 font-semibold"
        aria-label="Baixar Currículo (PDF)"
      >
        <span class="material-icons text-[18px]">download</span>
        Currículo
      </a>
    </nav>

    <!-- Mobile hamburger -->
    <button
      type="button"
      data-mobile-menu-toggle
      aria-expanded="false"
      aria-label="Abrir menu"
      class="md:hidden soft-glow inline-flex items-center justify-center w-10 h-10 rounded-lg border border-slate-700 bg-graphite/40 text-slate-200 hover:text-white"
    >
      <span class="material-icons" data-mobile-menu-icon>menu</span>
    </button>
  </div>

  <!-- Mobile menu panel -->
  <div data-mobile-menu class="hidden md:hidden border-t border-slate-800/70 bg-deep/95 backdrop-blur-sm">
    <nav class="max-w-7xl mx-auto px-6 py-5 flex flex-col gap-1 text-sm font-medium text-slate-300">
      <a href="#sobre"        data-mobile-menu-link class="px-3 py-2.5 rounded-lg hover:bg-graphite/50 hover:text-blue-300">Sobre</a>
      <a href="#experiencia"  data-mobile-menu-link class="px-3 py-2.5 rounded-lg hover:bg-graphite/50 hover:text-blue-300">Experiência</a>
      <a href="#certificados" data-mobile-menu-link class="px-3 py-2.5 rounded-lg hover:bg-graphite/50 hover:text-blue-300">Certificados</a>
      <a href="#educacao"     data-mobile-menu-link class="px-3 py-2.5 rounded-lg hover:bg-graphite/50 hover:text-blue-300">Educação</a>
      <a href="#contatos"     data-mobile-menu-link class="px-3 py-2.5 rounded-lg hover:bg-graphite/50 hover:text-blue-300">Contato</a>
      <div class="flex flex-col gap-3 pt-4 mt-2 border-t border-slate-800/60">
        <a
          href="https://wiki.nettotech.com.br/"
          target="_blank"
          rel="noopener noreferrer"
          class="soft-glow inline-flex items-center gap-2 justify-center rounded-lg border border-electric/60 bg-electric/85 hover:bg-electric text-white px-4 py-2.5 font-semibold"
          aria-label="Abrir Wiki em nova aba"
        >
          <span class="material-icons text-[18px]">auto_stories</span>
          Wiki
        </a>
        <a
          href="CV%20-%20Pedro%20H%20Netto.pdf"
          download="CV - Pedro H Netto.pdf"
          class="soft-glow inline-flex items-center gap-2 justify-center rounded-lg border border-slate-600 bg-graphite/55 hover:border-electric/60 text-slate-100 px-4 py-2.5 font-semibold"
          aria-label="Baixar Currículo (PDF)"
        >
          <span class="material-icons text-[18px]">download</span>
          Download Currículo
        </a>
      </div>
    </nav>
  </div>
</header>
